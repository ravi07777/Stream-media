name: Build APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: 17

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v5

    - name: Build APK
      run: ./gradlew assemblePrereleaseRelease

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: cloudstream-prerelease
        path: app/build/outputs/apk/prerelease/release/*.apk
